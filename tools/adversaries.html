<!DOCTYPE html>
<html lang='en' class='h-full'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>WFRP 4e Adversaries</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .stat-grid { grid-template-columns: repeat(12, minmax(0, 1fr)); }
    </style>
</head>
<body class='bg-gray-950 text-gray-200 min-h-full p-4 md:p-8'>
    <main class='mx-auto max-w-7xl'>
        <header class='mb-6'>
            <p class='mb-2 text-sm text-gray-400'><a href='../index.html' class='text-blue-400 hover:text-blue-300'>Tools</a></p>
            <h1 class='text-3xl font-bold text-white'>WFRP 4e Adversaries</h1>
            <p class='mt-2 max-w-3xl text-gray-400'>Searchable adversary reference with sensory descriptions, stat blocks, traits, and optional traits from the provided bestiary screenshots.</p>
        </header>

        <section class='mb-6 grid gap-3 md:grid-cols-[1fr_220px]'>
            <label class='block'>
                <span class='mb-1 block text-sm font-medium text-gray-400'>Search</span>
                <input id='searchInput' type='search' placeholder='Name, description, group, trait...' class='w-full rounded-lg border border-gray-700 bg-gray-900 p-3 text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30'>
            </label>
            <label class='block'>
                <span class='mb-1 block text-sm font-medium text-gray-400'>Group</span>
                <select id='groupFilter' class='w-full rounded-lg border border-gray-700 bg-gray-900 p-3 text-white outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30'>
                    <option value='all'>All groups</option>
                </select>
            </label>
        </section>

        <div id='resultCount' class='mb-4 text-sm text-gray-400'></div>
        <section id='adversaryList' class='grid gap-4 lg:grid-cols-2'></section>
    </main>

    <script src='adversaries-data.js'></script>
    <script>
        const statOrder = ['M', 'WS', 'BS', 'S', 'T', 'I', 'Ag', 'Dex', 'Int', 'WP', 'Fel', 'W'];
        const adversaries = window.adversariesData || [];

        const searchInput = document.getElementById('searchInput');
        const groupFilter = document.getElementById('groupFilter');
        const adversaryList = document.getElementById('adversaryList');
        const resultCount = document.getElementById('resultCount');

        const groups = [...new Set(adversaries.map(adversary => adversary.group))].sort();
        for (const group of groups) {
            const option = document.createElement('option');
            option.value = group;
            option.textContent = group;
            groupFilter.appendChild(option);
        }

        function renderStats(stats) {
            return `
                <div class='overflow-x-auto rounded-lg border border-gray-700'>
                    <div class='grid stat-grid min-w-[680px] bg-gray-900 text-center text-xs font-semibold text-gray-400'>
                        ${statOrder.map(stat => `<div class='border-r border-gray-700 p-2 last:border-r-0'>${stat}</div>`).join('')}
                    </div>
                    <div class='grid stat-grid min-w-[680px] bg-gray-800 text-center text-sm text-white'>
                        ${statOrder.map(stat => `<div class='border-r border-gray-700 p-2 last:border-r-0'>${stats[stat]}</div>`).join('')}
                    </div>
                </div>
            `;
        }

        function renderTags(items) {
            if (!items || items.length === 0) return `<span class='text-gray-500'>None listed</span>`;
            return items.map(item => `<span class='rounded-full bg-gray-700 px-2.5 py-1 text-xs text-gray-200'>${item}</span>`).join(' ');
        }

        function searchableText(adversary) {
            return [
                adversary.name,
                adversary.subtitle || '',
                adversary.description || '',
                adversary.group,
                ...(adversary.traits || []),
                ...(adversary.optional || [])
            ].join(' ').toLowerCase();
        }

        function render() {
            const query = searchInput.value.trim().toLowerCase();
            const selectedGroup = groupFilter.value;
            const filtered = adversaries.filter(adversary => {
                const matchesQuery = !query || searchableText(adversary).includes(query);
                const matchesGroup = selectedGroup === 'all' || adversary.group === selectedGroup;
                return matchesQuery && matchesGroup;
            });

            resultCount.textContent = `${filtered.length} of ${adversaries.length} adversaries shown`;
            adversaryList.innerHTML = filtered.map(adversary => `
                <article class='rounded-2xl border border-gray-800 bg-gray-900 p-4 shadow-xl'>
                    <div class='mb-3 flex flex-col gap-1 md:flex-row md:items-start md:justify-between'>
                        <div>
                            <h2 class='text-xl font-semibold text-white'>${adversary.name}</h2>
                            ${adversary.subtitle ? `<p class='text-sm text-gray-400'>${adversary.subtitle}</p>` : ''}
                        </div>
                        <div class='text-sm text-gray-400'>${adversary.group} · p. ${adversary.page}</div>
                    </div>
                    <p class='mb-4 text-sm leading-6 text-gray-300'>${adversary.description}</p>
                    ${renderStats(adversary.stats)}
                    <div class='mt-4'>
                        <h3 class='mb-2 text-sm font-semibold text-gray-300'>Traits</h3>
                        <div class='flex flex-wrap gap-2'>${renderTags(adversary.traits)}</div>
                    </div>
                    <div class='mt-4'>
                        <h3 class='mb-2 text-sm font-semibold text-gray-300'>Optional</h3>
                        <div class='flex flex-wrap gap-2'>${renderTags(adversary.optional)}</div>
                    </div>
                </article>
            `).join('');
        }

        searchInput.addEventListener('input', render);
        groupFilter.addEventListener('change', render);
        render();
    </script>
</body>
</html>
